services:
  v2ray:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: v2ray-custom:local
    container_name: v2ray
    restart: unless-stopped
    env_file:
      - .env
    network_mode: host

  v2ray-panel:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: v2ray-panel:local
    container_name: v2ray-panel
    restart: unless-stopped
    depends_on:
      - v2ray
      - subconverter
    env_file:
      - .env
    environment:
      API_PORT: 2016
      STATE_FILE: /data/ports.json
      V2RAY_API_COMMAND: /usr/local/bin/v2ray
      V2RAY_API_SERVER: "${V2RAY_API_SERVER:-127.0.0.1:${V2RAY_API_PORT:-10085}}"
      V2RAY_UPSTREAM_HOST: "${V2RAY_UPSTREAM_HOST:-host.docker.internal}"
      V2RAY_UPSTREAM_PORT: "${V2RAY_UPSTREAM_PORT:-${V2RAY_API_PORT:-10085}}"
      PANEL_INTERNAL_BASE_URL: "http://v2ray-panel:2016"
      SUBCONVERTER_INTERNAL_URL: "http://subconverter:25500/sub"
      TRAFFIC_STATS_SOURCE: "${TRAFFIC_STATS_SOURCE:-v2ray}"
      NGINX_TRAFFIC_STATS_FILE: "${NGINX_TRAFFIC_STATS_FILE:-/data/nginx-traffic.json}"
      NGINX_MANAGED_CONFIG_PATH: "${NGINX_MANAGED_CONFIG_PATH:-/data/nginx-managed-http.conf}"
      NGINX_RELOAD_COMMAND: "${NGINX_RELOAD_COMMAND:-nginx -s reload}"
    ports:
      - "${PANEL_PORT:-2016}:2016"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data

  subconverter:
    image: tindy2013/subconverter:latest
    container_name: v2ray-subconverter
    restart: unless-stopped
