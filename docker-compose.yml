services:
  v2ray:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: v2ray-custom:local
    container_name: v2ray
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${V2RAY_PORT:-10086}:${V2RAY_PORT:-10086}"

  v2ray-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: v2ray-api:local
    container_name: v2ray-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_PORT: 2016
    ports:
      - "2016:2016"
