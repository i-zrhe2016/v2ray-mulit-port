services:
  v2ray:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: v2ray-custom:local
    container_name: v2ray
    restart: unless-stopped
    env_file:
      - .env

  v2ray-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: v2ray-api:local
    container_name: v2ray-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_PORT: 2016

  v2ray-gateway:
    image: nginx:1.27-alpine
    container_name: v2ray-gateway
    restart: unless-stopped
    depends_on:
      - v2ray
      - v2ray-api
    ports:
      - "10086:10086"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
